project:
  type: website
  output-dir: _site

website:
  title: "Organizing and Curating Image Corpora"
  description: "With Tropy and Arvest — Workshop for ED 481 SSH / CHORAL"
  favicon: img/DCMI-logo.png
  repo-url: https://github.com/ujubib/ed-tropy-arvest
  repo-actions: [source, issue]

  navbar:
    title: "Tropy & Arvest"
    right:
      - icon: github
        href: https://github.com/ujubib/ed-tropy-arvest
      - icon: envelope
        href: mailto:julien.rabaud@univ-pau.fr

  sidebar:
    style: "floating"
    background: FloralWhite
    contents:
      - section: "Workshop"
        contents:
          - text: "Home"
            href: index.qmd
          - text: "Slides"
            href: slides.qmd
      - section: "Resources"
        contents:
          - text: "Semantic Web & Metadata"
            href: resources/semantic-web.qmd
          - text: "IIIF"
            href: resources/iiif.qmd
          - text: "Tropy"
            href: resources/tropy.qmd
          - text: "Arvest"
            href: resources/arvest.qmd

  page-footer:
    background: floralwhite
    border: false
    left: "Made with [Quarto](https://quarto.org) · UPPA · ED 481 SSH · CHORAL"
    right: "Last update: {{< meta site-date >}}"

site-date: 2026-03-10

format:
  html:
    theme: [journal, custom.scss]
    css: styles.css
    backgroundcolor: floralwhite
    lang: en
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
    reference-location: margin
    number-sections: false
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 300px
      gutter-width: 1.5rem

brand: _brand.yml
